<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Alhamed Cebrano</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-wrapper">
    <header>
      <nav class="navbar">
        <div class="logo">Alhamed Cebrano</div>
        <ul class="nav-links">
          <li><button id="homeBtn">Home</button></li>
          <li><button id="aboutBtn">About</button></li>
          <li><button id="projectsBtn">Projects</button></li>
          <li><button id="contactBtn">Contact</button></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="contact-section fade-in">
        <h1>Contact Me</h1>
        <form id="contactForm">
          <input type="text" id="name" placeholder="Your Name" required>
          <input type="email" id="email" placeholder="Your Email" required>
          <textarea id="message" placeholder="Your Message" required></textarea>
          <button type="submit">Send Message</button>
          <p id="formMessage"></p>
        </form>
      </section>
    </main>

    <footer>
      <div class="footer-container">
        <p>&copy; 2026 Alhamed Cebrano</p>
      </div>
    </footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
